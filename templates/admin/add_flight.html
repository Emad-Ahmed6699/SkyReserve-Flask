{% extends "base.html" %}

{% block title %}Route Initialization | SkyReserve{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-12 space-y-12">
    <!-- Header -->
    <header class="space-y-4" data-aos="fade-up">
        <div class="inline-flex items-center gap-2 px-3 py-1 bg-primary/10 text-primary rounded-full text-[10px] font-bold uppercase tracking-widest">
            <i data-lucide="plus-circle" class="w-3 h-3"></i>
            Schedule Expansion
        </div>
        <h1 class="text-4xl font-display tracking-tight">Initialize <span class="text-primary italic">Route.</span></h1>
        <p class="text-text-secondary">Configure a new flight path and assign aircraft to the active fleet schedule.</p>
    </header>

    <!-- Form -->
    <form action="/add-flight" method="POST" class="space-y-12" data-aos="fade-up" data-aos-delay="100">
        <div class="card-premium bg-surface/50 p-8 border-outline-variant/10 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-40 ml-1">Flight Identifier</label>
                    <input type="text" name="flight_number" class="input-premium" placeholder="SR-711" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-40 ml-1">Assigned Aircraft</label>
                    <select name="aircraft" class="input-premium appearance-none">
                        <option value="Gulfstream G650">Gulfstream G650</option>
                        <option value="Bombardier Global 7500">Bombardier Global 7500</option>
                        <option value="Cessna Citation Longitude">Cessna Citation Longitude</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-40 ml-1">Departure Vector (Origin)</label>
                    <input type="text" name="origin" class="input-premium" placeholder="London (LHR)" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-40 ml-1">Arrival Vector (Destination)</label>
                    <input type="text" name="destination" class="input-premium" placeholder="New York (JFK)" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-40 ml-1">Departure Window</label>
                    <input type="datetime-local" name="departure_time" class="input-premium" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-40 ml-1">Arrival Window</label>
                    <input type="datetime-local" name="arrival_time" class="input-premium" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-40 ml-1">Payload Valuation (Price)</label>
                    <div class="relative">
                        <span class="absolute left-6 top-1/2 -translate-y-1/2 text-primary font-bold">$</span>
                        <input type="number" name="price" class="input-premium pl-10" placeholder="25000" required>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-40 ml-1">Available Compartments (Seats)</label>
                    <input type="number" name="seats_available" class="input-premium" placeholder="12" required>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-between">
            <a href="/admin" class="text-xs text-text-secondary hover:text-primary transition-all underline underline-offset-4 decoration-1">Cancel Initialization</a>
            <button type="submit" class="btn-premium btn-primary px-12 py-4">
                Deploy Route to Fleet
            </button>
        </div>
    </form>
</div>
{% endblock %}
